name: Feature request
description: Propose a new capability or contract improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow or engineering risk does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the desired behavior, command, artifact, or contract.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - PrismSpec
        - Context
        - Verification
        - Evidence / Eval
        - Loop / Learn
        - Install / Upgrade
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Optional tradeoffs or rejected approaches.
    validations:
      required: false
