api_version: prismspec.lattice.dev/v1
kind: SkillPack
metadata:
  name: prismspec
  version: 0.1.0
  description: Progressive Spec-Driven Development skill pack for AI coding agents.
  language: zh-CN
  license: MIT
compatibility:
  agents:
    - claude-code
    - codex
    - cursor
    - aider
    - superpowers
  host_modes:
    - standalone
    - lattice-hosted
entrypoints:
  command: prismspec/commands/prismspec.md
  new: prismspec/bin/new.sh
  router: prismspec/bin/guide.sh
  lint: prismspec/bin/lint.sh
  doctor: prismspec/bin/doctor.sh
commands:
  canonical:
    - id: prismspec
      path: prismspec/commands/prismspec.md
    - id: spec
      path: prismspec/commands/spec.md
    - id: plan
      path: prismspec/commands/plan.md
    - id: implement
      path: prismspec/commands/implement.md
    - id: review
      path: prismspec/commands/review.md
    - id: verify
      path: prismspec/commands/verify.md
    - id: capture
      path: prismspec/commands/capture.md
skills:
  canonical:
    - id: workflow
      type: controller
      path: prismspec/skills/workflow/SKILL.md
      interface: prismspec/skills/workflow/agents/openai.yaml
    - id: specification
      type: stage
      path: prismspec/skills/specification/SKILL.md
      interface: prismspec/skills/specification/agents/openai.yaml
    - id: planning
      type: stage
      path: prismspec/skills/planning/SKILL.md
      interface: prismspec/skills/planning/agents/openai.yaml
    - id: implementation
      type: stage
      path: prismspec/skills/implementation/SKILL.md
      interface: prismspec/skills/implementation/agents/openai.yaml
    - id: review
      type: stage
      path: prismspec/skills/review/SKILL.md
      interface: prismspec/skills/review/agents/openai.yaml
    - id: verification
      type: stage
      path: prismspec/skills/verification/SKILL.md
      interface: prismspec/skills/verification/agents/openai.yaml
    - id: knowledge-capture
      type: support
      path: prismspec/skills/knowledge-capture/SKILL.md
      interface: prismspec/skills/knowledge-capture/agents/openai.yaml
workflow:
  stages:
    - id: specification
      skill: prismspec/skills/specification/SKILL.md
      outputs:
        - context.md
        - spec.md
    - id: planning
      skill: prismspec/skills/planning/SKILL.md
      inputs:
        - context.md
        - spec.md
      outputs:
        - plan.md
    - id: implementation
      skill: prismspec/skills/implementation/SKILL.md
      inputs:
        - spec.md
        - plan.md
      outputs:
        - code
        - tests
        - task evidence
    - id: review
      skill: prismspec/skills/review/SKILL.md
      inputs:
        - spec.md
        - plan.md
        - task evidence
      outputs:
        - review-summary.json
    - id: verification
      skill: prismspec/skills/verification/SKILL.md
      inputs:
        - spec.md
        - plan.md
        - code
        - tests
        - review-summary.json
      outputs:
        - verify.md
templates:
  context: prismspec/templates/context-template.md
  default: prismspec/templates/spec-template.md
  lite: prismspec/templates/spec-template-lite.md
  service: prismspec/templates/spec-template-service.md
  frontend: prismspec/templates/spec-template-frontend.md
  tdd: prismspec/templates/spec-template-tdd.md
references:
  mode_selection: prismspec/references/mode-selection.md
  definition_of_done: prismspec/references/definition-of-done.md
  spec_quality: prismspec/references/spec-quality-checklist.md
  tdd_evidence: prismspec/references/tdd-evidence-checklist.md
  review_evidence: prismspec/references/review-evidence-checklist.md
  superpowers_alignment: prismspec/references/superpowers-alignment.md
reviewers:
  task: prismspec/agents/task-reviewer.md
contracts:
  standalone_spec_root: prismspec/specs
  lattice_spec_root: lattice/specs
  required_artifacts:
    - context.md
    - spec.md
    - plan.md
    - verify.md
  execution_modes:
    - auto
    - plan
    - tdd
quality_gates:
  - bash prismspec/bin/doctor.sh
  - bash prismspec/bin/new.sh --help
  - bash prismspec/bin/guide.sh --json
  - bash prismspec/bin/lint.sh prismspec skillpack
  - bash prismspec/bin/lint.sh <spec-dir>
