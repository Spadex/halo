# sources.yaml — Lattice context source registry
#
# This file declares where context may come from. Runtime scripts keep the
# source of truth explicit so AI agents can cite context and handle conflicts.

sources:
  project:
    knowledge_dir: "lattice/context/knowledge/project"
    description: "Project-owned durable rules, decisions, pitfalls, and glossary."
  central:
    repo: ""
    knowledge_dir: "lattice/context/knowledge/central"
    mode: read-only
    conflict: project-wins
    description: "Optional team or organization knowledge imported into this project."
  code:
    include:
      - "README.md"
      - "docs/**"
      - "src/**"
      - "app/**"
      - "internal/**"
      - "packages/**"
    exclude:
      - "**/node_modules/**"
      - "**/.git/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/.env*"

policy:
  precedence:
    - user_instruction
    - project_knowledge
    - code_facts
    - project_specs
    - central_knowledge
    - model_prior
  conflict: project_wins
  sensitivity: redact_secret
  require_per_spec_context: true
