# flow.yaml — Lattice phase behavior guide (not a runtime config)
# Engine-agnostic phase definitions. For engine-specific mappings, see docs/adapters/

stages:
  - name: brainstorming
    output: "lattice/specs/{spec-id}/spec.md"
    template: "lattice/kernel/orchestrator/templates/spec-template.md"
    gate: spec-lint
    layers: [orchestrator, knowledge]
    description: "Explore code and knowledge base, clarify intent, author persistent spec"

  - name: planning
    output: "lattice/specs/{spec-id}/plan.md"
    layers: [orchestrator]
    description: "Decompose spec into AC-traced execution tasks"

  - name: implementation
    gate: [build, lint, test]
    layers: [orchestrator, delivery]
    policy: [plan, tdd]
    description: "Execute plan policy or red-test-first TDD policy"

  - name: verification
    command: "lattice/kernel/delivery/pipeline.sh"
    gate: [bootstrap, spec-lint, build, lint, unit-test, ac-coverage, integration-test, drift-check, compliance]
    on_fail: fix
    max_retries: 3
    layers: [delivery]
    description: "Run independent verification gates; fix and re-run on failure"

  - name: finishing
    output: "lattice/specs/{spec-id}/summary.md"
    gate: [evidence]
    layers: [orchestrator, delivery]
    description: "Confirm evidence, close delivery, extract durable knowledge"

  - name: deploy
    command: "lattice/kernel/delivery/deploy.sh"
    gate: smoke
    layers: [delivery]
    description: "Deploy per manifest config and run smoke tests"

transitions:
  brainstorming -> planning: "spec is reviewable and execution policy selected"
  planning -> implementation: "plan complete"
  implementation -> verification: "build + lint + focused tests pass"
  verification -> finishing: "pipeline passes"
  verification -> implementation: "pipeline fails, fix and retry"
  finishing -> deploy: "deploy config exists and deployment requested"

behavioral_rules:
  hard_gate: brainstorming
  retry_budget: 3
  spec_lock: "bash lattice/kernel/delivery/gates/spec-lock.sh acquire <spec-file>"
