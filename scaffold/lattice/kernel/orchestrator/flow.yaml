# flow.yaml — Lattice phase behavior guide (not a runtime config)
# Engine-agnostic phase definitions. For engine-specific mappings, see docs/adapters/

stages:
  - name: design
    output: "lattice/specs/{requirement}-{slug}.md"
    template: "lattice/kernel/orchestrator/templates/spec-template.md"
    gate: spec-lint
    layers: [orchestrator, knowledge]
    description: "Explore code and knowledge base, clarify requirements, author reviewable spec"

  - name: approve
    action: human
    input: "lattice/specs/*.md"
    description: "HARD-GATE: spec must be approved before implementation begins"

  - name: plan
    output: "lattice/plans/{requirement}-{slug}.md"
    layers: [orchestrator]
    description: "Decompose into AC-traced execution tasks"

  - name: implement
    gate: [build, lint, test]
    layers: [orchestrator, delivery]
    description: "Implement per spec + plan, follow TDD and AC naming conventions"

  - name: verify
    command: "lattice/kernel/delivery/pipeline.sh"
    gate: [bootstrap, spec-lint, build, lint, unit-test, ac-coverage, integration-test, drift-check, compliance]
    on_fail: fix
    max_retries: 3
    layers: [delivery]
    description: "Run independent verification gates; fix and re-run on failure"

  - name: deliver
    gate: [evidence]
    layers: [orchestrator, delivery]
    description: "Confirm full coverage, no spec drift, then finalize"

  - name: deploy
    command: "lattice/kernel/delivery/deploy.sh"
    gate: smoke
    layers: [delivery]
    description: "Deploy per manifest config and run smoke tests"

transitions:
  design -> approve: "spec-lint passes"
  approve -> plan: "spec approved"
  plan -> implement: "plan complete"
  implement -> verify: "build + lint + test pass"
  verify -> deliver: "pipeline passes"
  verify -> implement: "pipeline fails, fix and retry"
  deliver -> deploy: "deploy config exists and deployment requested"

behavioral_rules:
  hard_gate: approve
  retry_budget: 3
  spec_lock: "bash lattice/kernel/delivery/gates/spec-lock.sh acquire <spec-file>"
